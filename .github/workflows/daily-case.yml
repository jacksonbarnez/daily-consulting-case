name: Select Daily Case

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  select-case:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Select daily case
        run: node scripts/selectDailyCase.js

      - name: Commit updated daily case
        run: |
          git config user.name "daily-case-bot"
          git config user.email "daily-case-bot@users.noreply.github.com"
          git add data/used_cases.json public/data/today.json public/data/archive.json
          git diff --cached --quiet || git commit -m "Update daily consulting case"
          git push
          